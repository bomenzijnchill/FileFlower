<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FileFlower</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
            margin: 0;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        h3 {
            margin: 0 0 12px 0;
            font-size: 14px;
        }
        .status {
            padding: 8px;
            background: #2d2d2d;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .status.connected {
            background: #0e4d1e;
        }
        .status.error {
            background: #4d0e0e;
        }
        #projectInfo {
            padding: 8px;
            background: #2d2d2d;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 12px;
            color: #888;
        }
        .info-box {
            padding: 8px;
            background: #2a1e18;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 11px;
            color: #E5B181;
        }
        #log {
            font-size: 10px;
            font-family: 'Courier New', monospace;
            max-height: 100px;
            overflow-y: auto;
            background: #000;
            padding: 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h3>FileFlower</h3>
    <div id="status" class="status">Initialiseren...</div>
    <div id="projectInfo">Laden...</div>
    <div class="info-box">
        💡 De background service draait automatisch.<br>
        Dit panel is optioneel voor status weergave.
    </div>
    <div id="log"></div>
    
    <script src="CSInterface.js"></script>
    <script src="index.js"></script>
</body>
</html>
