<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
    }
    
    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
      color: #1a1a1a;
    }
    
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ccc;
    }
    
    .status-dot.connected {
      background: #34c759;
    }
    
    .status-dot.disconnected {
      background: #ff3b30;
    }
    
    .info {
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }
    
    .metadata-preview {
      margin-top: 12px;
      padding: 12px;
      background: #f9f9f9;
      border-radius: 8px;
      font-size: 12px;
    }
    
    .metadata-preview h3 {
      font-size: 12px;
      margin: 0 0 8px 0;
      color: #666;
    }
    
    .metadata-item {
      margin-bottom: 4px;
    }
    
    .metadata-label {
      color: #999;
    }
    
    .metadata-value {
      color: #333;
      font-weight: 500;
    }
    
    .no-metadata {
      color: #999;
      font-style: italic;
    }
    
    .process-btn {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      background: #DE6B48;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .process-btn:hover {
      background: #A44B2F;
    }
    
    .process-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    .process-btn.success {
      background: #34c759;
    }
    
    .process-btn.error {
      background: #ff3b30;
    }
  </style>
</head>
<body>
  <h1>🎵 FileFlower Helper</h1>
  
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Checking connection...</span>
  </div>
  
  <div class="info">
    Deze extensie scrapt metadata van stock muziek sites en stuurt het naar de FileFlower app.
  </div>
  
  <div class="metadata-preview" id="metadataPreview">
    <h3>Laatste metadata</h3>
    <div id="metadataContent" class="no-metadata">
      Nog geen metadata gescraped
    </div>
  </div>
  
  <button class="process-btn" id="processBtn" disabled>Verwerk metadata</button>
  
  <script src="popup.js"></script>
</body>
</html>
